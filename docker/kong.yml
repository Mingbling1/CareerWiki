## Kong Declarative Configuration
## Minimal setup for Supabase Auth (GoTrue) routing
## Docs: https://docs.konghq.com/gateway/latest/production/deployment-topologies/db-less-and-declarative-config/

_format_version: "2.1"
_transform: true

services:
  ## ── Auth (GoTrue) ──────────────────────────────────────────
  - name: auth-v1
    url: http://supabase-auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:3000
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - Accept
            - apikey
            - x-client-info
          exposed_headers:
            - X-Total-Count
          credentials: true
          max_age: 3600
