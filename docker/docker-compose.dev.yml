services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: empliq-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: empliq
      POSTGRES_PASSWORD: empliq_dev_password
      POSTGRES_DB: empliq
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empliq"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - empliq-network

  # ==========================================
  # Supabase Auth (GoTrue) — Local OAuth
  # ==========================================
  supabase-auth:
    image: supabase/gotrue:v2.158.1
    container_name: empliq-supabase-auth
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: "http://localhost:8000"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgres://supabase_auth_admin:supabase_auth_admin_password@postgres:5432/empliq_pre_prod"
      GOTRUE_SITE_URL: "http://localhost:3000"
      GOTRUE_URI_ALLOW_LIST: "http://localhost:3000"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_SECRET: "${JWT_SECRET}"
      # Session: 7 days active, refresh tokens rotate for security
      GOTRUE_SESSION_TIMEBOX: "604800"
      GOTRUE_SESSION_INACTIVITY_TIMEOUT: "604800"
      GOTRUE_SESSION_REFRESH_TOKEN_ROTATION_ENABLED: "true"
      GOTRUE_SECURITY_REFRESH_TOKEN_REUSE_INTERVAL: "10"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "false"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "${GOOGLE_OAUTH_ENABLED:-false}"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOTRUE_EXTERNAL_GOOGLE_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: "http://localhost:8000/auth/v1/callback"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - empliq-network

  # ==========================================
  # Supabase Kong (API Gateway)
  # ==========================================
  supabase-kong:
    image: kong:2.8.1
    container_name: empliq-supabase-kong
    ports:
      - "8000:8000"
    depends_on:
      supabase-auth:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong.yml
      KONG_DNS_ORDER: "LAST,A,CNAME"
      KONG_PLUGINS: cors
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: "160k"
      KONG_NGINX_PROXY_PROXY_BUFFERS: "64 160k"
    volumes:
      - ./kong.yml:/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - empliq-network

  # ==========================================
  # Supabase Meta (postgres-meta) — for Studio
  # ==========================================
  supabase-meta:
    image: supabase/postgres-meta:v0.95.2
    container_name: empliq-supabase-meta
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: empliq
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: supabase_admin_password
    networks:
      - empliq-network

  # ==========================================
  # Supabase Studio (Dashboard UI)
  # ==========================================
  supabase-studio:
    image: supabase/studio:latest
    container_name: empliq-supabase-studio
    depends_on:
      - supabase-meta
      - supabase-kong
    ports:
      - "54323:3000"
    environment:
      HOSTNAME: "::"
      STUDIO_PG_META_URL: "http://supabase-meta:8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: empliq
      POSTGRES_PASSWORD: supabase_admin_password
      DEFAULT_ORGANIZATION_NAME: "Empliq Dev"
      DEFAULT_PROJECT_NAME: "Empliq Local"
      SUPABASE_URL: "http://supabase-kong:8000"
      SUPABASE_PUBLIC_URL: "http://localhost:8000"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      AUTH_JWT_SECRET: "${JWT_SECRET}"
      NEXT_PUBLIC_ENABLE_LOGS: "false"
    networks:
      - empliq-network

  # ==========================================
  # API Backend (NestJS)
  # ==========================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: empliq-api
    ports:
      - "4000:4000"
    volumes:
      - ../apps/api:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://empliq:empliq_dev_password@postgres:5432/empliq_pre_prod
      - CORS_ORIGINS=http://localhost:3000
      - SUPABASE_URL=http://supabase-kong:8000
      - SUPABASE_JWT_SECRET=${JWT_SECRET}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      supabase-kong:
        condition: service_healthy
    command: npm run dev
    networks:
      - empliq-network

  # ==========================================
  # Website (Next.js) — Main App + Landing
  # ==========================================
  website:
    build:
      context: ..
      dockerfile: docker/Dockerfile.website
    container_name: empliq-website
    network_mode: host
    volumes:
      - ../apps/website:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      - NEXT_PUBLIC_SUPABASE_URL=http://localhost:8000
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      supabase-kong:
        condition: service_healthy
    command: npm run dev

  # ==========================================
  # Scraper API Microservice (NestJS)
  # ==========================================
  api-scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api-scraper
    container_name: empliq-api-scraper
    ports:
      - "3457:3457"
    volumes:
      - ../apps/empliq-scraper-api:/app
      - /app/node_modules
    env_file:
      - ../apps/empliq-scraper-api/.env
    environment:
      - NODE_ENV=development
      - SCRAPER_PORT=3457
      - DDG_HTTP_MAX=200
      - PUPPETEER_MAX=80
      - PLAYWRIGHT_MAX=50
    command: npm run dev
    networks:
      - empliq-network

networks:
  empliq-network:
    driver: bridge

volumes:
  postgres_data:
